<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pippara E.M. High School | GSR Universe ERP</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="container-fluid vh-100">

<div class="row h-100">

<!-- =======================================
LEFT SIDE
======================================= -->

<div class="col-lg-7 left-panel d-none d-lg-flex">

<div class="overlay">

<div class="school-info">

<img src="assets/images/logo.png" class="logo">

<h1>Pippara E.M. High School</h1>

<p>Powered by GSR Universe ERP</p>

</div>

</div>

</div>

<!-- =======================================
RIGHT SIDE
======================================= -->

<div class="col-lg-5 d-flex justify-content-center align-items-center">

<div class="login-card">

<h2>Welcome Back 👋</h2>

<p>Please login to continue</p>

<!-- ==============================
ROLE CARDS
============================== -->

<label class="form-label fw-bold">

Login As

</label>

<div class="role-container">

<div

class="role-card active"

id="adminCard"

onclick="selectRole('ADMIN')">

<i class="bi bi-person-fill-lock"></i>

<span>Admin</span>

</div>

<div

class="role-card"

id="facultyCard"

onclick="selectRole('FACULTY')">

<i class="bi bi-mortarboard-fill"></i>

<span>Faculty</span>

</div>

<div

class="role-card"

id="parentCard"

onclick="selectRole('PARENT')">

<i class="bi bi-people-fill"></i>

<span>Parent</span>

</div>

</div>

<!-- ==============================
EMAIL / MOBILE
============================== -->

<div class="mb-3 mt-4">

<label

id="usernameLabel"

class="form-label fw-bold">

Email

</label>

<input

type="text"

id="username"

class="form-control"

placeholder="Enter Email">

</div>

<!-- ==============================
PASSWORD
============================== -->

<div

class="mb-3"

id="passwordSection">

<label class="form-label fw-bold">

Password

</label>

<input

type="password"

id="password"

class="form-control"

placeholder="Enter Password">

</div>

<!-- ==============================
OTP
============================== -->

<div

class="mb-3 d-none"

id="otpSection">

<label class="form-label fw-bold">

OTP

</label>

<input

type="text"

id="otp"

class="form-control"

placeholder="Enter OTP">

</div>

<!-- ==============================
BUTTONS
============================== -->

<div class="d-grid gap-2">

<button
    id="loginBtn"
    class="btn btn-primary"
    onclick="login()">

    Login

</button>

<button
    id="sendOtpBtn"
    class="btn btn-success d-none"
    onclick="sendOTP()">

    Send OTP

</button>

<button
    id="verifyOtpBtn"
    class="btn btn-primary d-none"
    onclick="verifyOTP()">

    Verify OTP

</button>

</div>

<div

id="message"

class="mt-3 text-center">

</div>

</div>

</div>

</div>

</div>

<!-- =======================================
JS
======================================= -->

<script src="js/api.js"></script>

<script src="js/login.js"></script>

</body>

</html>
