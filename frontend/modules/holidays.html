<!-- =====================================================
Holidays Module
Part 1
===================================================== -->

<div class="container-fluid">

    <div class="card shadow-sm">

        <div class="card-header">

            <h4 class="mb-0">

                Holiday Management

            </h4>

        </div>

        <div class="card-body">

            <div class="row">

                <!-- Holiday Name -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Holiday Name

                    </label>

                    <input
                        type="text"
                        id="holidayName"
                        class="form-control"
                        placeholder="Enter Holiday Name">

                </div>

                <!-- Holiday Type -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Holiday Type

                    </label>

                    <select
                        id="holidayType"
                        class="form-select">

                        <option value="">Select Type</option>

                        <option value="National">

                            National

                        </option>

                        <option value="Festival">

                            Festival

                        </option>

                        <option value="School">

                            School

                        </option>

                        <option value="Government">

                            Government

                        </option>

                        <option value="Other">

                            Other

                        </option>

                    </select>

                </div>

            </div>

            <div class="row">

                <!-- Description -->

                <div class="col-md-12 mb-3">

                    <label class="form-label">

                        Description

                    </label>

                    <textarea
                        id="description"
                        class="form-control"
                        rows="4"
                        placeholder="Enter Description"></textarea>

                </div>

            </div>

            <div class="row">

                <!-- Start Date -->

                <div class="col-md-4 mb-3">

                    <label class="form-label">

                        Start Date

                    </label>

                    <input
                        type="date"
                        id="startDate"
                        class="form-control">

                </div>

                <!-- End Date -->

                <div class="col-md-4 mb-3">

                    <label class="form-label">

                        End Date

                    </label>

                    <input
                        type="date"
                        id="endDate"
                        class="form-control">

                </div>

                <!-- Target Scope -->

                <div class="col-md-4 mb-3">

                    <label class="form-label">

                        Target Audience

                    </label>

                    <select
                        id="targetScope"
                        class="form-select">

                        <option value="">Select Target</option>

                        <option value="Students">Students</option>

                        <option value="Parents">Parents</option>

                        <option value="Faculty">Faculty</option>

                        <option value="All">All</option>

                    </select>

                </div>

            </div>
            <!-- =====================================================
Holidays Module
Part 2
===================================================== -->

            <div class="mt-3">

                <button
                    id="saveHolidayBtn"
                    class="btn btn-primary">

                    Save Holiday

                </button>

                <button
                    id="clearHolidayBtn"
                    class="btn btn-secondary ms-2">

                    Clear

                </button>

            </div>

        </div>

    </div>

    <br>
    <!-- =====================================================
Holidays Module
Part 3
===================================================== -->

    <div class="card shadow-sm">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h5 class="mb-0">

                Holiday List

            </h5>

            <input
                type="text"
                id="searchHoliday"
                class="form-control w-25"
                placeholder="Search Holidays">

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover">

                    <thead class="table-light">

                        <tr>

                            <th>#</th>

                            <th>Holiday Name</th>

                            <th>Type</th>

                            <th>Start Date</th>

                            <th>End Date</th>

                            <th>Target</th>

                            <th>Created By</th>

                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="holidayTableBody">

                        <tr>

                            <td colspan="8" class="text-center">

                                No Holidays Available

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- =====================================================
End Holidays Module
===================================================== -->
