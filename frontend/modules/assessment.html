<div class="container-fluid">

    <div class="card shadow-sm">

        <div class="card-header">

            <h4 class="mb-0">
                Assessment Management
            </h4>

        </div>

        <div class="card-body">

            <div class="row">

                <!-- Class -->

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Class
                    </label>

                    <select
                        id="classSelect"
                        class="form-select">

                        <option value="">
                            Select Class
                        </option>

                    </select>

                </div>

                <!-- Academic Year -->

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Academic Year
                    </label>

                    <select
                        id="academicYearSelect"
                        class="form-select">

                        <option value="">
                            Select Academic Year
                        </option>

                    </select>

                </div>

                <!-- Subject -->

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Subject
                    </label>

                    <select
                        id="subjectSelect"
                        class="form-select">

                        <option value="">
                            Select Subject
                        </option>

                    </select>

                </div>

            </div>

            <div class="row">

                <!-- Assessment Type -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Assessment Type
                    </label>

                    <select
                        id="assessmentType"
                        class="form-select">

                        <option value="">
                            Select Assessment
                        </option>

                        <option value="Unit Test 1">
                            Unit Test 1
                        </option>

                        <option value="Unit Test 2">
                            Unit Test 2
                        </option>

                        <option value="Slip Test">
                            Slip Test
                        </option>

                        <option value="Quarterly">
                            Quarterly
                        </option>

                        <option value="Half Yearly">
                            Half Yearly
                        </option>

                        <option value="Pre Final">
                            Pre Final
                        </option>

                        <option value="Annual">
                            Annual
                        </option>

                    </select>

                </div>

                <!-- Total Marks -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Total Marks
                    </label>

                    <input
                        type="number"
                        id="totalMarks"
                        class="form-control"
                        placeholder="Enter Total Marks">

                </div>

            </div>
            <!-- ==========================================
Assessments Module
Part 2
========================================== -->

            <div class="row">

                <!-- Assessment Date -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Assessment Date
                    </label>

                    <input
                        type="date"
                        id="assessmentDate"
                        class="form-control">

                </div>

            </div>

            <div class="row mt-3">

                <div class="col-md-12">

                    <button
                        id="saveAssessmentBtn"
                        class="btn btn-primary">

                        Save Assessment

                    </button>

                    <button
                        id="clearAssessmentBtn"
                        type="reset"
                        class="btn btn-secondary ms-2">

                        Clear

                    </button>

                </div>

            </div>

        </div>

    </div>

    <br>
    <!-- ==========================================
Assessments Module
Part 3
Assessment List
========================================== -->

    <div class="card shadow-sm mt-4">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h5 class="mb-0">
                Assessment List
            </h5>

            <div class="w-25">

                <input
                    type="text"
                    id="searchAssessment"
                    class="form-control"
                    placeholder="Search Assessment">

            </div>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle">

                    <thead class="table-light">

                        <tr>

                            <th>#</th>

                            <th>Class</th>

                            <th>Section</th>

                            <th>Academic Year</th>

                            <th>Subject</th>

                            <th>Assessment Type</th>

                            <th>Total Marks</th>

                            <th>Assessment Date</th>

                            <th>Created By</th>

                            <th width="150">Actions</th>

                        </tr>

                    </thead>

                    <tbody id="assessmentTableBody">

                        <tr>

                            <td colspan="10" class="text-center">

                                No Assessments Available

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- ==========================================
End Assessments Module
========================================== -->
