<!-- =====================================================
FACULTY MANAGEMENT
===================================================== -->

<div class="fade-in">

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2 class="fw-bold">

            <i class="bi bi-people-fill text-primary"></i>

            Faculty Management

        </h2>

        <p class="text-muted mb-0">

            Create, update and manage faculty accounts.

        </p>

    </div>

    <button

        class="btn btn-primary"
        onclick="openFacultyModal()">

        <i class="bi bi-person-plus-fill"></i>

        Add Faculty

    </button>

</div>

<!-- =====================================================
SEARCH & ACTIONS
===================================================== -->

<div class="card shadow-sm border-0 mb-4">

    <div class="card-body">

        <div class="row g-3">

            <div class="col-lg-6">

                <div class="input-group">

                    <span class="input-group-text">

                        <i class="bi bi-search"></i>

                    </span>

                    <input

                        type="text"

                        class="form-control"

                        id="facultySearch"

                        placeholder="Search by Employee ID, Name
                                                    onkeyup="searchFaculty()">

                </div>

            </div>

            <div class="col-lg-6 text-end">

                <button

                    class="btn btn-outline-primary"

                    onclick="loadFaculty()">

                    <i class="bi bi-arrow-clockwise"></i>

                    Refresh

                </button>

            </div>

        </div>

    </div>

</div>

<!-- =====================================================
FACULTY TABLE
===================================================== -->

<div class="card shadow-sm border-0">

    <div class="card-header bg-white">

        <h5 class="mb-0">

            Faculty List

        </h5>

    </div>

    <div class="card-body p-0">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-primary">

                    <tr>

                        <th>ID</th>

                        <th>Employee ID</th>

                        <th>Name</th>

                        <th>Email</th>

                        <th>Mobile</th>

                        <th>Subject</th>

                        <th>Role</th>

                        <th>Status</th>

                        <th width="180">

                            Actions

                        </th>

                    </tr>

                </thead>

                <tbody id="facultyTableBody">

                    <tr>

                        <td colspan="9" class="text-center p-5">

                            <div class="spinner-border text-primary"></div>

                            <p class="mt-3 mb-0">

                                Loading Faculty...

                            </p>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- =====================================================
ADD / EDIT FACULTY MODAL
===================================================== -->

<div class="modal fade"

     id="facultyModal"

     tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header">

                <h5 id="facultyModalTitle">

                    Add Faculty

                </h5>

                <button

                    class="btn-close"

                    data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body" id="facultyFormContainer">

                <!-- faculty.js will generate the form here -->

            </div>

        </div>

    </div>

</div>

</div>
