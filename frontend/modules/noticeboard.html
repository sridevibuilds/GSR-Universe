<!-- =====================================================
Notice Board Module
Part 1
===================================================== -->

<div class="container-fluid">

    <div class="card shadow-sm">

        <div class="card-header">

            <h4 class="mb-0">

                Notice Board Management

            </h4>

        </div>

        <div class="card-body">

            <div class="row">

                <!-- Notice Title -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Notice Title

                    </label>

                    <input
                        type="text"
                        id="title"
                        class="form-control"
                        placeholder="Enter Notice Title">

                </div>

                <!-- Target Scope -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Target Audience

                    </label>

                    <select
                        id="targetScope"
                        class="form-select">

                        <option value="">Select Target</option>

                        <option value="Students">Students</option>

                        <option value="Parents">Parents</option>

                        <option value="Faculty">Faculty</option>

                        <option value="All">All</option>

                    </select>

                </div>

            </div>

            <div class="row">

                <!-- Description -->

                <div class="col-md-12 mb-3">

                    <label class="form-label">

                        Description

                    </label>

                    <textarea
                        id="description"
                        class="form-control"
                        rows="5"
                        placeholder="Enter Notice Description"></textarea>

                </div>

            </div>

            <div class="row">

                <!-- Attachment -->

                <div class="col-md-12 mb-3">

                    <label class="form-label">

                        Attachment

                    </label>

                    <input
                        type="file"
                        id="noticeAttachment"
                        class="form-control"
                        accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">

                </div>

            </div>
            <!-- =====================================================
Notice Board Module
Part 2
===================================================== -->

            <div class="mt-3">

                <button
                    id="saveNoticeBtn"
                    class="btn btn-primary">

                    Save Notice

                </button>

                <button
                    id="clearNoticeBtn"
                    class="btn btn-secondary ms-2">

                    Clear

                </button>

            </div>

        </div>

    </div>

    <br>
    <!-- =====================================================
Notice Board Module
Part 3
===================================================== -->

    <div class="card shadow-sm">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h5 class="mb-0">

                Notice Board List

            </h5>

            <input
                type="text"
                id="searchNotice"
                class="form-control w-25"
                placeholder="Search Notices">

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover">

                    <thead class="table-light">

                        <tr>

                            <th>#</th>

                            <th>Title</th>

                            <th>Description</th>

                            <th>Attachment</th>

                            <th>Target</th>

                            <th>Created By</th>

                            <th>Created At</th>

                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="noticeTableBody">

                        <tr>

                            <td colspan="8" class="text-center">

                                No Notices Available

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- =====================================================
End Notice Board Module
===================================================== -->
